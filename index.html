<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeakBlox - Classic Roblox Revival</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <style>
        body { margin:0; font-family:Arial; background:#0a0a0a; color:white; overflow-x:hidden; }
        header { background:#111; padding:15px; text-align:center; }
        h1 { color:#ff4d4d; margin:0; }
        .nav { padding:10px; background:#1a1a1a; text-align:center; }
        button { background:#ff4d4d; color:white; border:none; padding:12px 24px; margin:5px; cursor:pointer; font-size:16px; }
        .game-container { display:none; padding:20px; }
        .active { display:block; }
    </style>
</head>
<body>
    <header>
        <h1>PEAKBLOX</h1>
        <p>Classic Roblox Private Server Revival</p>
    </header>

    <div class="nav">
        <button onclick="showSection('home')">Home</button>
        <button onclick="showSection('games')">Games</button>
        <button onclick="showSection('studio')">Studio</button>
        <button onclick="window.open('https://discord.com', '_blank')">Discord</button>
    </div>

    <div id="home" class="game-container active">
        <h2 style="text-align:center; padding:40px;">Welcome to PeakBlox</h2>
        <div style="text-align:center;">
            <button onclick="showSection('games')">Play Games</button>
        </div>
    </div>

    <div id="games" class="game-container">
        <h2 style="text-align:center;">Classic Games</h2>
        
        <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(300px,1fr)); gap:20px; padding:20px;">
            <!-- Natural Disaster Survival -->
            <div style="background:#1a1a1a; padding:15px; border-radius:8px;">
                <h3>Natural Disaster Survival</h3>
                <button onclick="launchGame('disaster')">Play</button>
            </div>

            <!-- Obby -->
            <div style="background:#1a1a1a; padding:15px; border-radius:8px;">
                <h3>Obstacle Course (Obby)</h3>
                <button onclick="launchGame('obby')">Play</button>
            </div>

            <!-- Ragdoll -->
            <div style="background:#1a1a1a; padding:15px; border-radius:8px;">
                <h3>Ragdoll Playground</h3>
                <button onclick="launchGame('ragdoll')">Play</button>
            </div>
        </div>
    </div>

    <div id="studio" class="game-container">
        <h2 style="text-align:center;">PeakBlox Studio (Basic)</h2>
        <p style="text-align:center;">Simple 3D builder coming soon - for now use the games above.</p>
    </div>

    <script>
        function showSection(section) {
            document.querySelectorAll('.game-container').forEach(el => el.classList.remove('active'));
            document.getElementById(section).classList.add('active');
        }

        function launchGame(type) {
            alert(`Launching ${type}... \n\n(Real mini-game would load here with Three.js)\n\nUse your PeakBlox.exe launcher for best experience.`);
            // In a full version this would load a full Three.js game
        }
    </script>
</body>
</html>
